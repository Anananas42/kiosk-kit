name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Shellcheck
        run: |
          find . -name '*.sh' \
            -not -path './node_modules/*' \
            -not -path './ansible/.venv/*' \
            -not -path './.husky/*' \
            -print0 \
          | xargs -0 shellcheck --severity=warning

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: rharkor/caching-for-turbo@v2.3.11

      - name: Check Drizzle migrations are up to date
        run: |
          DATABASE_URL=postgres://unused@localhost/unused pnpm --filter @kioskkit/web-server db:generate
          pnpm --filter @kioskkit/kiosk-server db:generate
          if [ -n "$(git diff --name-only -- '*/drizzle/*')" ]; then
            echo "::error::Drizzle schema is out of sync with migration files. Run 'pnpm --filter <package> db:generate' and commit the result."
            git diff --name-only -- '*/drizzle/*'
            exit 1
          fi

      - name: Lint, typecheck, test, build
        run: pnpm turbo lint typecheck test build
