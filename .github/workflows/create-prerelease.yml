name: Create Pre-release

on:
  push:
    tags: ["v*"]

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - run: gh release create "$GITHUB_REF_NAME" --prerelease --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
