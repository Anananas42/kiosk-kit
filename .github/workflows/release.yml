name: Release

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g. v1.2.3)"
        required: true

jobs:
  ci:
    if: github.event_name == 'workflow_dispatch' || (startsWith(github.event.release.tag_name, 'v') && github.event.release.author.type == 'User')
    uses: ./.github/workflows/ci.yml

  deploy-fly-stack:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          MIGRATION_URL=$(echo "$DATABASE_URL" | sed 's/-pooler//')
          DATABASE_URL="$MIGRATION_URL" pnpm --filter @kioskkit/web-server db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy . --config deploy/cloud/fly.toml --dockerfile deploy/cloud/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-landing:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build --filter=@kioskkit/landing

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/landing/dist

  build-app-bundle:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Check for kiosk-relevant changes
        id: changes
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — building"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$PREV_TAG" "$TAG" -- \
            packages/kiosk-server/ \
            packages/kiosk-client/ \
            packages/kiosk-admin/)
          if [ -n "$CHANGED" ]; then
            echo "Kiosk-relevant files changed:"
            echo "$CHANGED"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No kiosk-relevant changes since $PREV_TAG — skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.should_build == 'true'

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.should_build == 'true'
        with:
          node-version: 24
          cache: pnpm

      - name: Build app bundle
        if: steps.changes.outputs.should_build == 'true'
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          ./deploy/pi/build-app-bundle.sh "$VERSION"

      - name: Generate admin manifest
        if: steps.changes.outputs.should_build == 'true'
        id: manifest
        run: |
          MANIFEST=$(./scripts/generate-admin-manifest.sh)
          echo "json=$MANIFEST" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub release
        if: steps.changes.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          BUNDLE="deploy/pi/.output/app-bundle-${VERSION}.tar.gz"
          SHA256=$(cat "$BUNDLE.sha256" | cut -d' ' -f1)
          gh release upload "$TAG" "$BUNDLE" --clobber
          BODY=$(gh release view "$TAG" --json body -q .body)
          gh release edit "$TAG" --notes "${BODY}
          <!-- app-bundle-sha256:${SHA256} -->
          <!-- admin-manifest:${{ steps.manifest.outputs.json }} -->"

  update-release:
    needs: [ci, deploy-fly-stack, deploy-landing, build-app-bundle]
    if: >-
      always()
      && github.event_name == 'release'
      && startsWith(github.event.release.tag_name, 'v')
      && github.event.release.author.type == 'User'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          CI_RESULT: ${{ needs.ci.result }}
          FLY_RESULT: ${{ needs.deploy-fly-stack.result }}
          LANDING_RESULT: ${{ needs.deploy-landing.result }}
          BUNDLE_RESULT: ${{ needs.build-app-bundle.result }}
        run: |
          status() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }
          BODY=$(gh release view "$TAG" --json body -q .body)
          BODY="$BODY

          ## Deployment Status
          | Check | Status |
          |-------|--------|
          | CI (lint, typecheck, test, build) | $(status "$CI_RESULT") |
          | Deploy web-server + admin (Fly.io) | $(status "$FLY_RESULT") |
          | Deploy landing (GitHub Pages) | $(status "$LANDING_RESULT") |
          | Build & publish app bundle | $(status "$BUNDLE_RESULT") |"
          gh release edit "$TAG" --notes "$BODY"
