name: Release

on:
  release:
    types: [published]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-web:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config packages/web-server/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-landing:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build --filter=@kioskkit/landing

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/landing/dist

  update-release:
    needs: [ci, deploy-web, deploy-landing]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          CI_RESULT: ${{ needs.ci.result }}
          WEB_RESULT: ${{ needs.deploy-web.result }}
          LANDING_RESULT: ${{ needs.deploy-landing.result }}
        run: |
          status() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }
          BODY=$(gh release view "$TAG" --json body -q .body)
          BODY="$BODY

          ## Deployment Status
          | Check | Status |
          |-------|--------|
          | CI (lint, typecheck, test, build) | $(status "$CI_RESULT") |
          | Deploy web-server (Fly.io) | $(status "$WEB_RESULT") |
          | Deploy landing (GitHub Pages) | $(status "$LANDING_RESULT") |"
          gh release edit "$TAG" --notes "$BODY"
