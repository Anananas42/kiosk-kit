app = "kiosk-kit"
primary_region = "fra"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[env]
  COOKIE_DOMAIN = ".kioskk.net"

[mounts]
  source = "tailscale_state"
  destination = "/var/lib/tailscale"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
