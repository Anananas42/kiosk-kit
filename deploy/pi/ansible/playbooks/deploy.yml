---
# Push code update + rebuild — replaces deploy.sh + deploy timer.
# Run: ansible-playbook playbooks/deploy.yml -l <host>
- name: Deploy KioskKit update
  hosts: kiosks
  become: true
  vars_files:
    - ../roles/kioskkit/defaults/main.yml
  tasks:
    - name: Expand tmpfs for build (node-gyp needs >64M)
      ansible.builtin.command:
        cmd: mount -o remount,size=512M /tmp
      changed_when: true
      failed_when: false

    - name: Sync application files
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../../"
        dest: "{{ kioskkit_install_dir | default('/opt/kioskkit') }}/"
        delete: true
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
          - "--exclude=data/"
          - "--exclude=deploy/"
          - "--exclude=dev/"
          - "--exclude=plans/"
          - "--exclude=.env"
          - "--exclude=system/"
          - "--exclude=packages/web-client/"
          - "--exclude=packages/web-server/"
          - "--exclude=packages/web-admin/"
          - "--exclude=packages/landing/"

    - name: Set application ownership
      ansible.builtin.file:
        path: "{{ kioskkit_install_dir | default('/opt/kioskkit') }}"
        state: directory
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        recurse: true

    - name: Strip root devDependencies and prepare script (not needed on Pi)
      ansible.builtin.shell:
        cmd: >
          cd {{ kioskkit_install_dir | default('/opt/kioskkit') }} &&
          node -e "
            const pkg = require('./package.json');
            delete pkg.devDependencies;
            delete pkg.scripts.prepare;
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

    - name: Install dependencies and build
      ansible.builtin.command:
        cmd: "bash -lc 'cd {{ kioskkit_install_dir | default('/opt/kioskkit') }} && pnpm install --no-frozen-lockfile --filter @kioskkit/kiosk-server --filter @kioskkit/kiosk-client --filter @kioskkit/kiosk-admin --filter @kioskkit/shared --filter @kioskkit/ui && NODE_ENV=production pnpm --filter @kioskkit/shared --filter @kioskkit/ui --filter @kioskkit/kiosk-server --filter @kioskkit/kiosk-client --filter @kioskkit/kiosk-admin build'"
      become: true
      become_user: "{{ kioskkit_user | default('kiosk') }}"
      changed_when: true

    - name: Prune devDependencies after build
      ansible.builtin.command:
        cmd: "bash -lc 'cd {{ kioskkit_install_dir | default('/opt/kioskkit') }} && CI=true pnpm install --no-frozen-lockfile --prod --filter @kioskkit/kiosk-server --filter @kioskkit/kiosk-client --filter @kioskkit/kiosk-admin --filter @kioskkit/shared --filter @kioskkit/ui'"
      become: true
      become_user: "{{ kioskkit_user | default('kiosk') }}"
      changed_when: true

    - name: Create system config directory
      ansible.builtin.file:
        path: "{{ kioskkit_install_dir | default('/opt/kioskkit') }}/system/config"
        state: directory
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        mode: "0755"

    - name: Deploy display-sleep.py
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../system/config/display-sleep.py"
        dest: "{{ kioskkit_install_dir | default('/opt/kioskkit') }}/system/config/display-sleep.py"
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        mode: "0755"

    - name: Create labwc config directory
      ansible.builtin.file:
        path: "/home/{{ kioskkit_user | default('kiosk') }}/.config/labwc"
        state: directory
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        mode: "0755"

    - name: Deploy labwc rc.xml
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/kioskkit/templates/labwc-rc.xml.j2"
        dest: "/home/{{ kioskkit_user | default('kiosk') }}/.config/labwc/rc.xml"
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        mode: "0644"

    - name: Deploy labwc autostart
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/kioskkit/templates/labwc-autostart.j2"
        dest: "/home/{{ kioskkit_user | default('kiosk') }}/.config/labwc/autostart"
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        mode: "0755"

    - name: Deploy labwc environment
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/kioskkit/templates/labwc-environment.j2"
        dest: "/home/{{ kioskkit_user | default('kiosk') }}/.config/labwc/environment"
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        mode: "0644"

    - name: Remove chromium dev-shm workaround (redirects shm to /tmp which is only 64M)
      ansible.builtin.file:
        path: /etc/chromium.d/dev-shm
        state: absent

    - name: Ensure data directory exists
      ansible.builtin.file:
        path: "{{ kioskkit_install_dir | default('/opt/kioskkit') }}/data"
        state: directory
        owner: "{{ kioskkit_user | default('kiosk') }}"
        group: "{{ kioskkit_user | default('kiosk') }}"
        mode: "0755"

    - name: Deploy systemd service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/kioskkit/templates/kioskkit.service.j2"
        dest: /etc/systemd/system/kioskkit.service
        mode: "0644"

    - name: Clear Chromium cache
      ansible.builtin.file:
        path: "/home/{{ kioskkit_user | default('kiosk') }}/.cache/chromium"
        state: absent

    - name: Restart kioskkit service
      ansible.builtin.systemd:
        name: kioskkit.service
        state: restarted
        daemon_reload: true

    - name: Restart greetd (restarts labwc + Chromium)
      ansible.builtin.systemd:
        name: greetd.service
        state: restarted
