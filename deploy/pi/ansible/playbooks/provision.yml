---
# Full initial provisioning — replaces setup.sh.
# Run: ansible-playbook playbooks/provision.yml -l <host>
- name: Provision KioskKit device
  hosts: kiosks
  become: true
  roles:
    - kioskkit
  # Reboot is handled by the build script (wait_for_reboot + shutdown_qemu)
  # rather than Ansible, since QEMU virt doesn't support ACPI reboot reliably.
