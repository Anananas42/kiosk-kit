---
# Application
kioskkit_install_dir: /opt/kioskkit
kioskkit_user: kiosk
kioskkit_node_major: 24
kioskkit_app_port: 3001

# Display
kioskkit_display_scale_factor: "1.6"
kioskkit_idle_timeout_secs: 2700
kioskkit_wake_grab_hold_secs: 4.0

# Tailscale — must be overridden per host
kioskkit_tailscale_auth_key: ""
kioskkit_device_id: ""
kioskkit_customer_tag: ""

# Cloud connectivity — must be overridden per deployment
kioskkit_web_server_url: ""

# System
kioskkit_cpu_governor: performance
kioskkit_tmpfs_size: 64M
kioskkit_watchdog_timeout_secs: 15
