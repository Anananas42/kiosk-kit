---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart kioskkit
  ansible.builtin.systemd:
    name: kioskkit.service
    state: restarted

- name: Reload nftables
  ansible.builtin.systemd:
    name: nftables.service
    state: restarted
  failed_when: false

- name: Reload udev
  ansible.builtin.command:
    cmd: udevadm control --reload-rules
  changed_when: false

- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd.service
    state: restarted
