---
- name: Create install directory
  ansible.builtin.file:
    path: "{{ kioskkit_install_dir }}"
    state: directory
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0755"

- name: Create releases directory
  ansible.builtin.file:
    path: "{{ kioskkit_install_dir }}/releases/initial"
    state: directory
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0755"

- name: Sync application files to initial release
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../../"
    dest: "{{ kioskkit_install_dir }}/releases/initial/"
    delete: true
    rsync_opts:
      - "--include=package.json"
      - "--include=pnpm-lock.yaml"
      - "--include=pnpm-workspace.yaml"
      - "--include=turbo.json"
      - "--include=tsconfig.base.json"
      - "--include=packages/"
      - "--include=packages/kiosk-server/***"
      - "--include=packages/kiosk-client/***"
      - "--include=packages/kiosk-admin/***"
      - "--include=packages/shared/***"
      - "--include=packages/ui/***"
      - "--exclude=**/node_modules"
      - "--exclude=*"
  notify: Restart kioskkit

- name: Set release ownership
  ansible.builtin.file:
    path: "{{ kioskkit_install_dir }}/releases/initial"
    state: directory
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    recurse: true

- name: Create data directory (bind mount from /data/kioskkit)
  ansible.builtin.file:
    path: "{{ kioskkit_install_dir }}/data"
    state: directory
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0755"

- name: Create data symlink inside initial release
  ansible.builtin.file:
    src: "{{ kioskkit_install_dir }}/data"
    dest: "{{ kioskkit_install_dir }}/releases/initial/data"
    state: link

- name: Create current symlink
  ansible.builtin.file:
    src: releases/initial
    dest: "{{ kioskkit_install_dir }}/current"
    state: link

- name: Deploy .env file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../../.env"
    dest: "{{ kioskkit_install_dir }}/.env"
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0600"
  failed_when: false

- name: Expand tmpfs for build (node-gyp needs >64M)
  ansible.builtin.command:
    cmd: mount -o remount,size=512M /tmp
  changed_when: true
  failed_when: false

- name: Strip root devDependencies and prepare script (not needed on Pi)
  ansible.builtin.shell:
    cmd: >
      cd {{ kioskkit_install_dir }}/current &&
      node -e "
        const pkg = require('./package.json');
        delete pkg.devDependencies;
        delete pkg.scripts.prepare;
        require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
      "

- name: Install dependencies and build
  ansible.builtin.command:
    cmd: bash -lc "cd {{ kioskkit_install_dir }}/current && pnpm install --no-frozen-lockfile --filter @kioskkit/kiosk-server --filter @kioskkit/kiosk-client --filter @kioskkit/kiosk-admin --filter @kioskkit/shared --filter @kioskkit/ui && NODE_ENV=production pnpm --filter @kioskkit/shared --filter @kioskkit/ui --filter @kioskkit/kiosk-server --filter @kioskkit/kiosk-client --filter @kioskkit/kiosk-admin build"
  become: true
  become_user: "{{ kioskkit_user }}"
  changed_when: true

- name: Prune devDependencies after build
  ansible.builtin.command:
    cmd: bash -lc "cd {{ kioskkit_install_dir }}/current && CI=true pnpm install --no-frozen-lockfile --prod --filter @kioskkit/kiosk-server --filter @kioskkit/kiosk-client --filter @kioskkit/kiosk-admin --filter @kioskkit/shared --filter @kioskkit/ui"
  become: true
  become_user: "{{ kioskkit_user }}"
  changed_when: true
  notify: Restart kioskkit

- name: Create system config directory
  ansible.builtin.file:
    path: "{{ kioskkit_install_dir }}/system/config"
    state: directory
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0755"

- name: Write persistent device identity
  ansible.builtin.copy:
    content: "DEVICE_ID={{ kioskkit_device_id }}\n"
    dest: /etc/kioskkit/device.conf
    owner: root
    group: root
    mode: "0644"
  when: kioskkit_device_id | length > 0

