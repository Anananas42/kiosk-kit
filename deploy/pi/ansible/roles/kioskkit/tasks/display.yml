---
- name: Create labwc config directory
  ansible.builtin.file:
    path: "/home/{{ kioskkit_user }}/.config/labwc"
    state: directory
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0755"

- name: Deploy labwc rc.xml
  ansible.builtin.template:
    src: labwc-rc.xml.j2
    dest: "/home/{{ kioskkit_user }}/.config/labwc/rc.xml"
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0644"

- name: Deploy labwc autostart
  ansible.builtin.template:
    src: labwc-autostart.j2
    dest: "/home/{{ kioskkit_user }}/.config/labwc/autostart"
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0755"

- name: Deploy labwc environment
  ansible.builtin.template:
    src: labwc-environment.j2
    dest: "/home/{{ kioskkit_user }}/.config/labwc/environment"
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0644"

- name: Enable seatd (seat management for labwc)
  ansible.builtin.systemd:
    name: seatd.service
    enabled: true
    state: started

- name: Deploy greetd config
  ansible.builtin.template:
    src: greetd-config.toml.j2
    dest: /etc/greetd/config.toml
    mode: "0644"

- name: Enable greetd (session manager for labwc)
  ansible.builtin.systemd:
    name: greetd.service
    enabled: true

- name: Install Chromium managed policies directory
  ansible.builtin.file:
    path: /etc/chromium/policies/managed
    state: directory
    mode: "0755"

- name: Deploy Chromium policies
  ansible.builtin.copy:
    src: chromium-policies.json
    dest: /etc/chromium/policies/managed/kioskkit.json
    mode: "0644"

- name: Remove chromium dev-shm workaround (redirects shm to /tmp which is only 64M)
  ansible.builtin.file:
    path: /etc/chromium.d/dev-shm
    state: absent

- name: Generate empty cursor theme
  ansible.builtin.script:
    cmd: "{{ playbook_dir }}/../../system/config/make-empty-cursor.py"
    creates: /usr/share/icons/emptycursor/cursors/default
