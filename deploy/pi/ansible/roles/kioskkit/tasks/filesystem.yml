---
- name: Create /data mount point
  ansible.builtin.file:
    path: /data
    state: directory
    mode: "0755"

- name: Mount data partition by label
  ansible.posix.mount:
    path: /data
    src: LABEL=kioskkit-data
    fstype: ext4
    opts: "defaults,noatime"
    state: present

- name: Create data partition subdirectories
  ansible.builtin.file:
    path: "/data/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - kioskkit
    - tailscale
    - wpa
    - kioskkit-config
    - journal
    - ssh
    - ota
    - ota/pending

- name: Set kioskkit data directory ownership
  ansible.builtin.file:
    path: /data/kioskkit
    state: directory
    owner: "{{ kioskkit_user }}"
    group: "{{ kioskkit_user }}"
    mode: "0755"

- name: Create bind mount target directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/kioskkit/data
    - /var/lib/tailscale
    - /etc/wpa_supplicant
    - /etc/kioskkit
    - /var/log/journal

- name: Add bind mount entries to fstab
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ item.src }}"
    fstype: none
    opts: bind
    state: present
  loop:
    - { src: /data/kioskkit, path: /opt/kioskkit/data }
    - { src: /data/tailscale, path: /var/lib/tailscale }
    - { src: /data/wpa, path: /etc/wpa_supplicant }
    - { src: /data/kioskkit-config, path: /etc/kioskkit }
    - { src: /data/journal, path: /var/log/journal }

- name: Mount tmpfs on /tmp
  ansible.posix.mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: "defaults,nosuid,nodev,size={{ kioskkit_tmpfs_size }}"
    state: present

- name: Add noatime to root filesystem
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '(\S+\s+/\s+\S+\s+)defaults(?!.*noatime)'
    line: '\1defaults,noatime 0 1'
    backrefs: true

- name: Set CPU governor to performance
  ansible.builtin.copy:
    content: 'GOVERNOR="{{ kioskkit_cpu_governor }}"'
    dest: /etc/default/cpufrequtils
    mode: "0644"
  failed_when: false
