---
- name: Add NodeSource signing key
  ansible.builtin.get_url:
    url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
    dest: /usr/share/keyrings/nodesource.asc
    mode: "0644"

- name: Add NodeSource repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ kioskkit_node_major }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install system packages
  ansible.builtin.apt:
    name:
      - labwc
      - seatd
      - greetd
      - wlr-randr
      - swayidle
      # Pin to Debian stable — Chromium 146 (Pi repo) has a shared memory
      # descriptor bug that crashes on Wayland compositors.
      - chromium=143.0.7499.169-1~deb12u1
      - fonts-noto-color-emoji
      - nftables
      - nodejs
      - python3-evdev
      - cloud-guest-utils
      - rsync
      - wpasupplicant
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable corepack for pnpm
  ansible.builtin.command:
    cmd: corepack enable
  changed_when: false

- name: Install pnpm via corepack
  ansible.builtin.command:
    cmd: corepack prepare pnpm@latest --activate
  changed_when: false

- name: Disable unnecessary services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - bluetooth
    - cups
    - lightdm
  failed_when: false

- name: Purge rpi-connect and rpi-chromium-mods
  ansible.builtin.apt:
    name:
      - rpi-connect
      - rpi-chromium-mods
    state: absent
    purge: true
  failed_when: false

- name: Set default target to graphical
  ansible.builtin.command:
    cmd: systemctl set-default graphical.target
  changed_when: false
