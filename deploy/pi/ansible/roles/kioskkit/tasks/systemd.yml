---
- name: Deploy privileged helper service
  ansible.builtin.template:
    src: kioskkit-privileged.service.j2
    dest: /etc/systemd/system/kioskkit-privileged.service
    mode: "0644"
  notify: Reload systemd

- name: Enable privileged helper service
  ansible.builtin.systemd:
    name: kioskkit-privileged.service
    enabled: true

- name: Deploy kioskkit systemd service
  ansible.builtin.template:
    src: kioskkit.service.j2
    dest: /etc/systemd/system/kioskkit.service
    mode: "0644"
  notify:
    - Reload systemd

- name: Enable kioskkit service
  ansible.builtin.systemd:
    name: kioskkit.service
    enabled: true

- name: Remove old deploy service
  ansible.builtin.file:
    path: /etc/systemd/system/kioskkit-deploy.service
    state: absent
  notify: Reload systemd

- name: Remove old deploy timer
  ansible.builtin.file:
    path: /etc/systemd/system/kioskkit-deploy.timer
    state: absent
  notify: Reload systemd
