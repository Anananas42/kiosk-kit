---
- name: Create WiFi scripts directory
  ansible.builtin.file:
    path: "{{ kioskkit_install_dir }}/system"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy WiFi management scripts
  ansible.builtin.copy:
    src: "system/{{ item }}"
    dest: "{{ kioskkit_install_dir }}/system/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - wifi-scan.sh
    - wifi-connect.sh
    - wifi-forget.sh
    - wifi-status.sh
    - wifi-enable.sh
    - wifi-disable.sh

- name: Disable WiFi radio by default (enabled on demand via wifi-enable.sh)
  ansible.builtin.command:
    cmd: nmcli radio wifi off
  changed_when: false
