services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: kioskkit
      POSTGRES_USER: kioskkit
      POSTGRES_PASSWORD: kioskkit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kioskkit"]
      interval: 2s
      timeout: 5s
      retries: 15

  dind:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    profiles: ["docker"]
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 2s
      timeout: 5s
      retries: 15

  agent:
    build:
      context: ../../..
      dockerfile: dev/agents/container/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../..:/mnt/repo:ro
      - ${HOME}/.config/github-apps/kiosk-kit-agent.pem:/mnt/secrets/kiosk-kit-agent.pem:ro
      - ${HOME}/.claude/.credentials.json:/mnt/secrets/claude-credentials.json:ro
      - agent-node-modules:/workspace/node_modules
      - agent-pnpm-store:/home/agent/.local/share/pnpm/store
    env_file:
      - ../../../.env
    environment:
      CI: "true"
      DATABASE_URL: postgresql://kioskkit:kioskkit@postgres:5432/kioskkit
      DOCKER_HOST: tcp://dind:2375
      CLAUDE_MODEL: claude-opus-4-6
      AGENT_TASK: ${AGENT_TASK:-}
      AGENT_NO_LOOP: ${AGENT_NO_LOOP:-}
    stdin_open: true
    tty: true

volumes:
  agent-node-modules:
  agent-pnpm-store:
    external: true
    name: kiosk-kit-agent-pnpm-store
