#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback
        iif lo accept

        # Established/related connections
        ct state established,related accept

        # SSH from any IP
        tcp dport 22 accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy drop;

        # Loopback
        oif lo accept

        # Established/related
        ct state established,related accept

        # SSH (git fetch)
        tcp dport 22 accept

        # HTTP + HTTPS (apt, etc.)
        tcp dport { 80, 443 } accept

        # DNS
        udp dport 53 accept
        tcp dport 53 accept

        # NTP
        udp dport 123 accept

        # DHCP
        udp dport { 67, 68 } accept
    }
}
